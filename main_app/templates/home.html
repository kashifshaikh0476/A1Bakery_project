{% extends 'base.html' %}
{% load static %}

{% block title %}
- Home
{% endblock %}

{% block content %}

<style>
/* === DESKTOP ONLY FIX (Banner Visibility) === */
.hero-section {
    position: relative;
    height: 85vh; 
    width: 100%;
    background-image: url("{% static 'images/A-one.jpg' %}") !important;
    background-size: cover !important; 
    background-position: center 0% !important; 
    background-repeat: no-repeat !important;
    background-attachment: scroll !important; 
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* === TEXT HIGHLIGHT SECTION (Desktop & Mobile) === */
.hero-title {
    font-family: 'Playfair Display', serif !important;
    font-weight: 900 !important;
    text-transform: uppercase;
    /* Luxury Gold Gradient */
    background: linear-gradient(to bottom, #D4AF37 0%, #FBF5B7 50%, #D4AF37 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    /* Strong Shadow taaki bright photo par bhi saaf dikhe */
    filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.9));
    font-size: 4.5rem;
    letter-spacing: 8px;
    margin: 0;
}

.hero-quote {
    color: #ffffff !important;
    font-size: 1.4rem !important;
    font-weight: 600 !important;
    font-style: italic;
    letter-spacing: 2px;
    margin-top: 10px;
    /* Isse 'Eat a taste of happiness' highlight hoga */
    text-shadow: 2px 2px 10px rgba(0,0,0,1), 0px 0px 5px rgba(0,0,0,0.8) !important;
}

.counter-glass-box {
    margin-top: 150px; /* Thoda aur niche taaki top banner clear dikhe */
    text-align: center;
    z-index: 5;
}

/* 2. MOBILE ONLY SETTINGS */
@media screen and (max-width: 600px) {
    .hero-section {
        height: 100vh !important;
        width: 100vw !important;
        margin-left: 50% !important;
        transform: translateX(-50%) !important;
        background-attachment: scroll !important;
    }

    .hero-title {
        font-size: 2.8rem !important; /* Mobile size */
        letter-spacing: 4px !important;
    }

    .hero-quote {
        font-size: 1.1rem !important; /* Mobile size */
        padding: 0 10px;
    }

    .counter-glass-box {
        margin-top: 80px !important; /* Mobile par upar rakha hai */
        width: 90% !important;
    }

    .container, .form-wrapper {
        overflow: visible !important;
    }
}

/* 3. BUTTON HIGHLIGHT (Desktop & Mobile Both) */
.btn-hero-order, .btn-order-online {
    background: linear-gradient(135deg, #D4AF37 0%, #FBF5B7 50%, #D4AF37 100%) !important;
    color: #000 !important;
    padding: 15px 40px !important;
    border-radius: 50px !important;
    font-weight: 900 !important;
    text-transform: uppercase;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3) !important;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    z-index: 5;
    position: relative;
}
</style>

<div class="hero-section">
    <div class="hero-overlay"></div>

    <div class="counter-glass-box">
        <h1 class="hero-title">A1 Bakery</h1>
        <p class="hero-quote">"Eat a taste of happiness"</p>
        
        <div class="hero-buttons">
            <a href="{% url 'shop' %}" class="btn-hero-order">
                ORDER ONLINE <i class="fas fa-shopping-basket" style="margin-left: 12px;"></i>
            </a>
        </div>
    </div>
</div>

<div class="features-strip" style="background: #000; padding: 25px 0; border-bottom: 3px solid #D4AF37;">
    <div style="display: flex; justify-content: space-around; max-width: 1100px; margin: 0 auto; flex-wrap: wrap;">
        <div class="feature-item" style="color: #fff; font-weight: 600;">
            <i class="fas fa-certificate" style="color: #D4AF37;"></i> 100% PURE VEG
        </div>
        <div class="feature-item" style="color: #fff; font-weight: 600;">
            <i class="fas fa-fire" style="color: #D4AF37;"></i> FRESHLY BAKED
        </div>
        <div class="feature-item" style="color: #fff; font-weight: 600;">
            <i class="fas fa-star" style="color: #D4AF37;"></i> PREMIUM QUALITY
        </div>
    </div>
</div>

{% endblock %}
